name: Web CI

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - "turbo.json"
      - ".github/workflows/web-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - "turbo.json"
      - ".github/workflows/web-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx turbo run lint --filter=...@kitecast/web

      - name: Typecheck
        run: npx turbo run typecheck --filter=...@kitecast/web

      - name: Build
        run: npx turbo run build --filter=...@kitecast/web
